<!DOCTYPE html>
<html lang="nl">
<head>
    <title>Quote about {{.Custom.Quote.Theme}}</title>
    <meta name="description" content="Quote about {{.Custom.Quote.Theme | lower}}: {{.Article.Title}}">
</head>
<body>
    <h1>{{.Article.Title}}</h1>
    <div class="content">{{.Translation.Content | safeHTML}}</div>
    <p class="theme">Theme: {{.Custom.Quote.Theme | lower}}</p>
    <p class="author">By: {{.Custom.Author.Name}}</p>
    <p class="match">VP Match: {{.Custom.Quote.VoorPositiviteitMatch}}%</p>
    <p class="emotion">Primary emotion: {{.Custom.Quote.EmotionalProfile.PrimaryEmotion | lower}}</p>
</body>
</html>
