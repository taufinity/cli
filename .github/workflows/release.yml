name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build release binaries
        env:
          TELEMETRY_KEY: ${{ secrets.TELEMETRY_KEY }}
          PIXL_BASE_URL: ${{ secrets.PIXL_BASE_URL }}
        run: |
          VERSION="${{ github.ref_name }}"
          COMMIT="${{ github.sha }}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # -s -w strips debug info and DWARF → smaller binaries
          LDFLAGS="-s -w \
            -X 'github.com/taufinity/cli/commands.Version=${VERSION}' \
            -X 'github.com/taufinity/cli/commands.GitCommit=${COMMIT}' \
            -X 'github.com/taufinity/cli/commands.BuildTime=${BUILD_TIME}' \
            -X 'github.com/taufinity/cli/internal/telemetry.TelemetryKey=${TELEMETRY_KEY}' \
            -X 'github.com/taufinity/cli/internal/pixl.PixlBaseURL=${PIXL_BASE_URL}'"

          mkdir -p dist

          targets=(
            "darwin/amd64"
            "darwin/arm64"
            "linux/amd64"
            "linux/arm64"
            "windows/amd64"
          )

          for target in "${targets[@]}"; do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            name="taufinity_${GOOS}_${GOARCH}"
            [ "$GOOS" = "windows" ] && name="${name}.exe"
            echo "Building ${name}…"
            CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH \
              go build -ldflags "$LDFLAGS" -o "dist/${name}" ./cmd/taufinity
          done

          cd dist
          sha256sum * > checksums.txt
          echo "--- checksums ---"
          cat checksums.txt

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  macos-pkg:
    runs-on: macos-latest
    needs: release
    steps:
      - uses: actions/checkout@v4

      - name: Download darwin binaries from release
        run: |
          mkdir -p dist
          gh release download "${{ github.ref_name }}" \
            --pattern "taufinity_darwin_*" \
            --dir dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build universal macOS binary
        run: |
          lipo -create -output dist/taufinity_darwin_universal \
            dist/taufinity_darwin_amd64 \
            dist/taufinity_darwin_arm64

      - name: Build macOS pkg
        run: bash installer/build-pkg.sh dist/taufinity_darwin_universal "${{ github.ref_name }}"

      - name: Upload pkg to release
        run: |
          gh release upload "${{ github.ref_name }}" \
            dist/taufinity_darwin_installer.pkg
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
          PIXL_BASE_URL: ${{ secrets.PIXL_BASE_URL }}
        run: |
          PKG_SHA=$(shasum -a 256 dist/taufinity_darwin_installer.pkg | awk '{print $1}')
          VERSION="${{ github.ref_name }}"
          git clone https://x-access-token:${TAP_TOKEN}@github.com/taufinity/homebrew-tap.git
          cd homebrew-tap
          git pull --rebase origin main
          sed -i '' "s/version \".*\"/version \"${VERSION#v}\"/" Casks/taufinity.rb
          sed -i '' "s/sha256 .*/sha256 \"${PKG_SHA}\"/" Casks/taufinity.rb
          # Ensure zap stanza fires uninstall pixel (idempotent; inserts before outermost end).
          # Uses $PIXL_BASE_URL so the URL stays in sync with the binary's ldflag.
          # Python rfind ensures nested do...end blocks (livecheck etc.) are not affected.
          python3 << 'PYEOF'
import os

base = os.environ.get('PIXL_BASE_URL', '').rstrip('/')
if not base:
    exit(0)

path = 'Casks/taufinity.rb'
content = open(path).read()
if (base + '/v1/uninstall') in content:
    exit(0)

zap = f"""
  zap script: {{
    executable: "/bin/bash",
    sudo:        false,
    args:        ["-c", "curl -sf '{base}/v1/uninstall?os=darwin' &>/dev/null || true"],
  }}"""

last_end = content.rfind('\nend\n')
if last_end == -1:
    last_end = content.rfind('\nend')
if last_end != -1:
    content = content[:last_end] + zap + content[last_end:]
    open(path, 'w').write(content)
PYEOF
          git config user.email "ci@taufinity.io"
          git config user.name "Taufinity CI"
          git add Casks/taufinity.rb
          git commit -m "bump taufinity to ${VERSION}"
          git push origin main
